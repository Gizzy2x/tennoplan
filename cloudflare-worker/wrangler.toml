name = "web"
main = "src/index.ts"
compatibility_date = "2026-04-30"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# SPA fallback — serves index.html for all unmatched routes (Cloudflare Pages behaviour)
[assets]
not_found_handling = "single-page-application"

# ---------------------------------------------------------------------------
# KV Namespace — TENNOPLAN_KV stores worldstate + codex blobs.
# Keys:
#   worldstate:current / previous / metadata   (~150KB, updated every 1 min)
#   codex:current / previous / metadata        (~2-3MB, updated every 6 hours)
#
# After running `wrangler kv namespace create TENNOPLAN_KV`, replace the id.
# ---------------------------------------------------------------------------
[[kv_namespaces]]
binding = "TENNOPLAN_KV"
id = "a520a78ecd264bff9b0abf38adff3f8a"

# ---------------------------------------------------------------------------
# Scheduled triggers
#   */1 * * * *   — every minute  → worldstate updater  (Phase B)
#   0 */6 * * *   — every 6 hours → codex updater       (Phase C)
# ---------------------------------------------------------------------------
[triggers]
crons = ["* * * * *", "0 */6 * * *"]

[vars]
LOG_LEVEL = "info"
MAX_STALENESS_MINUTES = "60"
FALLBACK_STALENESS_WARNING = "30"
