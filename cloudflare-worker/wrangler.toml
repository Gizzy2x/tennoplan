name = "app"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# ---------------------------------------------------------------------------
# Scheduled trigger — pulls warframestat.us once per minute and writes to KV.
# All Tennoplan clients read from KV, never hitting warframestat.us directly.
# ---------------------------------------------------------------------------
[triggers]
crons = ["* * * * *"]

# ---------------------------------------------------------------------------
# KV Namespace — stores the latest worldstate JSON + its ETag.
# After running `wrangler kv namespace create WORLDSTATE`, replace the IDs below.
# ---------------------------------------------------------------------------
[[kv_namespaces]]
binding = "WORLDSTATE"
id = "a520a78ecd264bff9b0abf38adff3f8a"
