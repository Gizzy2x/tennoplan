name = "app"
main = "src/index.ts"
compatibility_date = "2026-04-30"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# ---------------------------------------------------------------------------
# KV Namespace — TENNOPLAN_KV stores worldstate + codex blobs.
# Keys:
#   worldstate:current / previous / metadata   (~150KB, updated every 1 min)
#   codex:current / previous / metadata        (~2-3MB, updated every 6 hours)
# ---------------------------------------------------------------------------
[[kv_namespaces]]
binding = "TENNOPLAN_KV"
id = "a520a78ecd264bff9b0abf38adff3f8a"

# ---------------------------------------------------------------------------
# Scheduled triggers
#   * * * * *    — every minute  → worldstate updater
#   */5 * * * *  — every 5 min   → codex heartbeat (smart sync state machine)
#                  actual syncs: 24h normal | 6h patch/hotfix | 6min retry
# ---------------------------------------------------------------------------
[triggers]
crons = ["* * * * *", "*/5 * * * *"]

[vars]
LOG_LEVEL = "info"
MAX_STALENESS_MINUTES = "60"
FALLBACK_STALENESS_WARNING = "30"

# ---------------------------------------------------------------------------
# Alias @nestjs/swagger → local no-op stub.
#
# warframe-worldstate-parser decorates every model property with @nestjs/swagger
# ApiProperty/ApiPropertyOptional decorators for OpenAPI generation. We don't
# serve OpenAPI, so these are pure metadata noise at runtime. Bundling real
# @nestjs/swagger drags the entire NestJS tree (RxJS, reflect-metadata, Node
# HTTP shims) past the 1 MB Worker bundle limit and imports server-only code
# that breaks in Workers. The stub is ~200 bytes of no-op factories.
# ---------------------------------------------------------------------------
[alias]
"@nestjs/swagger" = "./src/stubs/nestjs-swagger.ts"
