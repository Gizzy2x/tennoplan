name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
      - Development

jobs:
  # ---------------------------------------------------------------------------
  # Frontend — deploys the React SPA to Cloudflare Pages.
  #
  # main        → production deployment  (tennoplan.pages.dev / custom domain)
  # Development → preview deployment     (auto-generated preview URL)
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend (Pages)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Production builds point at the live cron worker.
          # Preview builds inherit the same URL so they hit real data.
          VITE_WORLDSTATE_WORKER_URL: ${{ secrets.VITE_WORLDSTATE_WORKER_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pass the current branch; Pages treats non-main branches as previews.
          command: pages deploy dist --project-name=tennoplan --branch=${{ github.ref_name }}

  # ---------------------------------------------------------------------------
  # Backend — deploys the Worldstate cron worker to Cloudflare Workers.
  #
  # Only runs on main. The worker is shared between production and preview
  # (there is one KV namespace and one cron schedule).
  # ---------------------------------------------------------------------------
  deploy-worker:
    name: Deploy Worldstate Worker (app)
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install worker dependencies
        run: npm ci
        working-directory: cloudflare-worker

      - name: Deploy Worldstate Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare-worker
          command: deploy
