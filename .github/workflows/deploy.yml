name: Deploy to Cloudflare

# ---------------------------------------------------------------------------
# Production deploys, main only. Two workers:
#   • Frontend "web"  (root wrangler.jsonc, React SPA assets)  — deploy-frontend
#   • Backend  "app"  (cloudflare-worker/, /v1 + worldstate cron) — deploy-worker
#
# The old Pages job targeted a `tennoplan` Pages project that never existed and
# failed for over a month; the live frontend is the "web" worker (what
# `npm run deploy` ships). deploy-frontend now automates that so deploys aren't
# a manual-only step. The Codex KV blob is built/uploaded by build-codex.yml
# (separate workflow, every 6h + on demand).
# ---------------------------------------------------------------------------

on:
  push:
    branches: [main]

# GitHub forces JS actions onto Node 24 on 2026-06-16; opt in early so any
# breakage surfaces while we're watching, not on the flag day.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Frontend — build the React SPA and deploy it as the "web" worker
  # (root wrangler.jsonc → SPA assets). Mirrors local `npm run deploy`
  # (`npm run build && wrangler deploy`); the vite build emits the redirected
  # dist/wrangler.json that `wrangler deploy` then publishes.
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend (web worker)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build SPA
        run: npm run build
        env:
          # Production build points the client at the live cron worker.
          VITE_WORLDSTATE_WORKER_URL: ${{ secrets.VITE_WORLDSTATE_WORKER_URL }}

      - name: Deploy web worker (SPA assets)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

  # ---------------------------------------------------------------------------
  # Backend — the Worldstate / Codex cron worker (cloudflare-worker/). One worker
  # shared across the app (single KV namespace + cron schedule).
  # ---------------------------------------------------------------------------
  deploy-worker:
    name: Deploy Worldstate Worker (app)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare-worker/package-lock.json

      - name: Install worker dependencies
        run: npm ci
        working-directory: cloudflare-worker

      - name: Deploy Worldstate Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare-worker
          # --config wrangler.toml pins the deploy to THIS worker's config.
          # Without it, wrangler walks up the directory tree and can pick up an
          # unrelated config (a stray root-level wrangler.jsonc once overwrote
          # the worker with the SPA bundle).
          command: deploy --config wrangler.toml
