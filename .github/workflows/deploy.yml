name: Deploy to Cloudflare

# ---------------------------------------------------------------------------
# Production deploys, main only. Two workers:
#   • Frontend "web"  (root wrangler.jsonc, React SPA assets)  — deploy-frontend
#   • Backend  "app"  (cloudflare-worker/, /v1 + worldstate cron) — deploy-worker
#
# The previous Pages job targeted a `tennoplan` Pages project that doesn't
# exist; the live frontend is the "web" worker (what `npm run deploy` ships).
# This workflow automates that so deploys aren't a manual-only step.
# ---------------------------------------------------------------------------

on:
  push:
    branches:
      - main

# GitHub forces JS actions onto Node 24 on 2026-06-16; opt in early so any
# breakage surfaces while we're watching, not on the flag day.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Frontend — build the React SPA and deploy it as the "web" worker
  # (root wrangler.jsonc → SPA assets). Mirrors local `npm run deploy`
  # (`npm run build && wrangler deploy`); the vite build emits the redirected
  # dist/wrangler.json that `wrangler deploy` then publishes.
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend (web worker)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build SPA
        run: npm run build
        env:
          # Production build points the client at the live cron worker.
          VITE_WORLDSTATE_WORKER_URL: ${{ secrets.VITE_WORLDSTATE_WORKER_URL }}

      - name: Deploy web worker (SPA assets)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

  # ---------------------------------------------------------------------------
  # Backend — the Worldstate cron worker (cloudflare-worker/). One worker shared
  # across the app (single KV namespace + cron schedule).
  # ---------------------------------------------------------------------------
  deploy-worker:
    name: Deploy Worldstate Worker (app)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install worker dependencies
        run: npm ci
        working-directory: cloudflare-worker

      - name: Deploy Worldstate Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare-worker
          command: deploy
