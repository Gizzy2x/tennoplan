name: Deploy Worker

# ---------------------------------------------------------------------------
# Deploys the Worldstate / Codex cron worker to Cloudflare Workers.
#
# Tennoplan is a Tauri desktop app, not a hosted web frontend — there is no
# Pages project to deploy. The previous `deploy-frontend` job pointed at a
# non-existent `tennoplan` Pages project and failed on every run for over a
# month; it was removed entirely.
#
# Codex KV blob is built and uploaded by .github/workflows/build-codex.yml
# (separate workflow, runs every 6h + on demand).
# ---------------------------------------------------------------------------

on:
  push:
    branches: [main]

jobs:
  deploy-worker:
    name: Deploy Worldstate Worker (app)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare-worker/package-lock.json

      - name: Install worker dependencies
        run: npm ci
        working-directory: cloudflare-worker

      - name: Deploy Worldstate Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare-worker
          # --config wrangler.toml pins the deploy to THIS worker's config.
          # Without it, wrangler walks up the directory tree and can pick
          # up an unrelated config (a stray root-level wrangler.jsonc once
          # caused the worker to be overwritten with the SPA bundle).
          command: deploy --config wrangler.toml
