  <path d="M50 14 L46 14 M50 14 L50 18" stroke="#E3C372" stroke-width="1" stroke-opacity="0.2" stroke-linecap="round"/>
  <path d="M14 50 L18 50 M14 50 L14 46" stroke="#E3C372" stroke-width="1" stroke-opacity="0.2" stroke-linecap="round"/>
